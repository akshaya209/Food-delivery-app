name: Carbon Aware CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout full repo (IMPORTANT for git diff)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # REQUIRED for your pruner

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Run your CI Optimizer (IMPORTANT)
      - name: Run GreenOps CI Optimizer
        id: optimizer
        uses: akshaya209/ci-cd-optimiser@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 5. Run selected tests from optimizer output
      - name: Run selected tests
        run: |
          echo "Running selected tests..."
          ${{ steps.optimizer.outputs.test_command }}

      # 6. Fallback (if optimizer fails)
      - name: Fallback to full test suite
        if: failure()
        run: |
          echo "Optimizer failed → running full test suite"
          pytest
