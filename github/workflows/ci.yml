name: Carbon Aware CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your food delivery repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install dependencies of YOUR repo
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      # 4. Fetch full git history (VERY IMPORTANT for git diff)
      - name: Fetch full history
        run: |
          git fetch origin main --depth=1

      # 5. Run YOUR optimizer (reusable GitHub Action)
      - name: Run CI Optimizer (Test Pruner)
        uses: akshaya209/AI-powered-carbon-aware-ci-cd-pipeline-optimiser@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 6. Fallback (safety net)
      - name: Run full test suite (fallback)
        if: failure()
        run: |
          echo "Pruner failed → running full test suite"
          pytest
