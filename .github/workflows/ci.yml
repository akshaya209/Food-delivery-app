name: Carbon Aware CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout full repo (IMPORTANT for git diff)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 🔥 4. FIX: Make app/ importable
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      # (Optional but useful)
      - name: Debug Python path
        run: python -c "import sys; print(sys.path)"

      # 5. Run your CI Optimizer
      - name: Run GreenOps CI Optimizer
        id: optimizer
        uses: akshaya209/ci-cd-optimiser@v1
        continue-on-error: true   # IMPORTANT
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 6. Run selected tests (only if optimizer worked)
      - name: Run selected tests
        if: steps.optimizer.outcome == 'success'
        run: |
          echo "Running selected tests..."
          echo "${{ steps.optimizer.outputs.test_command }}"
          ${{ steps.optimizer.outputs.test_command }}

      # 7. Fallback (if optimizer fails OR outputs missing)
      - name: Fallback to full test suite
        if: steps.optimizer.outcome != 'success'
        run: |
          echo "Optimizer failed → running full test suite"
          pytest
